events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # 1. フロントエンド (nginxコンテナ) へのルーティング
        # 通常のWebアクセスはすべてここへ転送されます
        location / {
            proxy_pass http://nginx:80/;
        }

        # 2. バックエンド (backendコンテナ) へのルーティング
        # URLが /api/ で始まるリクエストをFlask (ポート5000) へ転送します
        location /api/ {
            proxy_pass http://backend:5000;
            
            # (推奨) クライアントの本来のIPアドレスなどをバックエンドに伝えるためのヘッダー設定
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. httpdコンテナへのルーティング（前回の設定を残す場合）
        location /web2/ {
            proxy_pass http://httpd:80/;
        }
    }
}