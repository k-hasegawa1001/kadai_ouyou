<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メッセージ送信フォーム</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
      }
      input[type="text"],
      textarea {
        width: 100%;
        max-width: 400px;
        padding: 0.5rem;
      }
      button {
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      #result {
        margin-top: 1rem;
        font-weight: bold;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>メッセージ送信フォーム</h1>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">名前:</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div class="form-group">
        <label for="message">メッセージ:</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit">送信</button>
    </form>

    <div id="result"></div>

    <script>
      document.getElementById("contactForm").addEventListener("submit", async function (event) {
        // HTMLの標準的なフォーム送信（画面遷移）をブロックします
        event.preventDefault();

        const nameInput = document.getElementById("name");
        const messageInput = document.getElementById("message");
        const resultDiv = document.getElementById("result");

        // 送信中のメッセージを表示
        resultDiv.textContent = "送信中...";
        resultDiv.className = "";

        // 送信するデータを用意
        const payload = {
          name: nameInput.value,
          message: messageInput.value,
        };

        try {
          // proxyコンテナ経由でバックエンドの /api/submit へPOSTリクエストを送信
          const response = await fetch("/api/submit", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (response.ok) {
            // HTTPステータスが200番台（成功）の場合
            resultDiv.textContent = data.message;
            resultDiv.className = "success";
            // フォームの入力内容をクリア
            this.reset();
          } else {
            // HTTPステータスが400や500など（エラー）の場合
            resultDiv.textContent = "エラー: " + (data.error || "不明なエラーが発生しました");
            resultDiv.className = "error";
          }
        } catch (error) {
          // ネットワークエラーなどで通信自体が失敗した場合
          resultDiv.textContent = "通信エラー: " + error.message;
          resultDiv.className = "error";
        }
      });
    </script>
  </body>
</html>
